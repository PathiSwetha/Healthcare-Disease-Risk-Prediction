<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Predict Disease</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand fw-bold" href="/">?? Healthcare AI</a>

</div>

</nav>

<div class="container mt-5">

<div class="card shadow-lg p-4">

<h2 class="text-center text-primary mb-4">

?? Heart Disease Prediction

</h2>

<form action="/prediction" method="POST">

<div class="row">

<div class="col-md-6 mb-3">
<label>Age</label>
<input type="number" name="age" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Gender</label>
<select name="sex" class="form-control">
<option value="1">Male</option>
<option value="0">Female</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Chest Pain Type</label>
<input type="number" name="cp" class="form-control" min="0" max="3" required>
</div>

<div class="col-md-6 mb-3">
<label>Resting Blood Pressure</label>
<input type="number" name="trestbps" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Cholesterol</label>
<input type="number" name="chol" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Fasting Blood Sugar</label>
<select name="fbs" class="form-control">
<option value="0">=120 mg/dl</option>
<option value="1">>120 mg/dl</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Rest ECG</label>
<input type="number" name="restecg" class="form-control" min="0" max="2">
</div>

<div class="col-md-6 mb-3">
<label>Maximum Heart Rate</label>
<input type="number" name="thalach" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Exercise Induced Angina</label>
<select name="exang" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Old Peak</label>
<input type="number" step="0.1" name="oldpeak" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Slope</label>
<input type="number" name="slope" class="form-control" min="0" max="2">
</div>

<div class="col-md-6 mb-3">
<label>Major Vessels (CA)</label>
<input type="number" name="ca" class="form-control" min="0" max="4">
</div>

<div class="col-md-12 mb-3">
<label>Thal</label>
<input type="number" name="thal" class="form-control" min="0" max="3">
</div>

</div>

<div class="text-center mt-4">

<button class="btn btn-danger btn-lg">

?? Predict Disease

</button>

</div>

</form>

</div>

</div>

</body>

</html>
